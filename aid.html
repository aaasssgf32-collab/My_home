<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة معايدة خاصة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf7f2;
            color: #3d3d3d;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            border: 2px solid #dfb76c;
            border-radius: 15px;
            padding: 35px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(223, 183, 108, 0.2);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: "✨";
            font-size: 30px;
            position: absolute;
            top: 10px;
            right: 15px;
        }
        .card::after {
            content: "✨";
            font-size: 30px;
            position: absolute;
            bottom: 10px;
            left: 15px;
        }
        h1 {
            color: #b3862b;
            font-size: 26px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #555555;
        }
        .signature {
            font-size: 20px;
            font-weight: bold;
            color: #b3862b;
            background-color: #fbf7ed;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            border: 1px dashed #dfb76c;
        }
        .highlight {
            color: #c44d4d;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>✨ معايدة من القلب ✨</h1>
    <p>
        أصدقائي الأعزاء،<br>
        أتقدم إليكم بأصدق التهاني وأجمل التبريكات بمناسبة الأيام المباركة، 
        سائلاً المولى عز وجل أن يجعل أيامكم كلها سروراً، وأن يتقبل منا ومنكم صالح الأعمال، 
        وكل عام وأنتم بألف خير وصحة وعافية.
    </p>
    <div class="signature">
        أخوكم: أحمد إبراهيم (أبو وتد) 🌸
    </div>
</div>

</body>
</html>
